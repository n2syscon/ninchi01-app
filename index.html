<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>認知機能検査 練習アプリ</title>
  <style>
    body { font-family: "Hiragino Sans", "Yu Gothic", sans-serif; margin: 0; background: #f5fbff; color: #222; text-align: center; line-height: 1.7; }
    .container { max-width: 900px; margin: 0 auto; padding: 18px; }
    h1 { font-size: 26px; margin: 18px 0 8px; }
    .lead { font-size: 18px; margin-bottom: 16px; }
    .card { background: #fff; border-radius: 16px; padding: 18px; box-shadow: 0 4px 14px rgba(0,0,0,0.08); margin-bottom: 18px; }
    img { width: 100%; max-width: 820px; border-radius: 12px; border: 1px solid #d7e8f5; }
    button { font-size: 22px; padding: 14px 24px; margin: 10px 6px; border: none; border-radius: 12px; cursor: pointer; background: #1976d2; color: white; font-weight: bold; }
    button.secondary { background: #666; }
    button.hintBtn { background: #2e7d32; }
    textarea { width: 95%; max-width: 760px; height: 150px; font-size: 22px; padding: 12px; border-radius: 12px; border: 2px solid #b8d8ef; box-sizing: border-box; }
    .hint { font-size: 17px; color: #555; }
    .hint-box { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 640px; margin: 10px auto 18px; }
    .hint-item { background: #eef7ff; border: 2px solid #b8d8ef; border-radius: 12px; padding: 12px; font-size: 22px; font-weight: bold; }
    .result { font-size: 22px; font-weight: bold; white-space: pre-line; margin-top: 14px; }
    .answer-list { font-size: 20px; background: #eef7ff; border-radius: 12px; padding: 12px; margin-top: 12px; }
    @media (max-width: 600px) {
      h1 { font-size: 22px; }
      .lead { font-size: 17px; }
      button { width: 95%; font-size: 21px; }
      textarea { height: 170px; font-size: 21px; }
      .hint-box { grid-template-columns: 1fr; }
      .hint-item { font-size: 21px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>認知機能検査 4枚の絵 練習</h1>
    <p class="lead">絵をよく見て、覚えてください。</p>

    <div id="studyScreen" class="card">
      <img src="pattern-a-1-labeled.png" alt="戦いの武器 大砲、楽器 オルガン、体の一部 耳、電気製品 ラジオ">
      <p class="hint">覚えたら、下のボタンを押してください。</p>
      <button onclick="goChoice()">覚えました</button>
    </div>

    <div id="choiceScreen" class="card" style="display:none;">
      <h2>どちらで答えますか？</h2>
      <p class="hint">本番に近い練習をしたい方は、まずは「ヒントなしで答える」を押してください。</p>
      <button onclick="goAnswer(false)">ヒントなしで答える</button>
      <button class="hintBtn" onclick="goAnswer(true)">分類のヒントを見てから答える</button>
      <button class="secondary" onclick="goStudy()">もう一度見る</button>
    </div>

    <div id="answerScreen" class="card" style="display:none;">
      <h2>覚えている絵を書いてください</h2>

      <div id="hintArea" style="display:none;">
        <p class="hint">分類のヒントです。この分類から絵を思い出してください。</p>
        <div class="hint-box">
          <div class="hint-item">戦いの武器</div>
          <div class="hint-item">楽器</div>
          <div class="hint-item">体の一部</div>
          <div class="hint-item">電気製品</div>
        </div>
      </div>

      <p class="hint">ひらがな、カタカナ、漢字のいずれかで答えてください</p>
      <textarea id="userAnswer" placeholder="ここに入力してください"></textarea><br>
      <button onclick="checkAnswer()">答え合わせ</button>
      <button class="secondary" onclick="goStudy()">もう一度見る</button>
    </div>

    <div id="resultScreen" class="card" style="display:none;">
      <h2>結果</h2>
      <div id="result" class="result"></div>
      <div class="answer-list">正解：大砲、オルガン、耳、ラジオ</div>
      <button onclick="resetPractice()">もう一度練習する</button>
    </div>
  </div>

  <script>
const correctAnswers = [
  ["大砲", "たいほう", "タイホウ"],
  ["オルガン", "おるがん"],
  ["耳", "みみ", "ミミ"],
  ["ラジオ", "らじお"]
];
    function showOnly(screenId) {
      document.getElementById("studyScreen").style.display = "none";
      document.getElementById("choiceScreen").style.display = "none";
      document.getElementById("answerScreen").style.display = "none";
      document.getElementById("resultScreen").style.display = "none";
      document.getElementById(screenId).style.display = "block";
    }

    function goChoice() { showOnly("choiceScreen"); }

    function goAnswer(showHint) {
      document.getElementById("hintArea").style.display = showHint ? "block" : "none";
      showOnly("answerScreen");
      document.getElementById("userAnswer").focus();
    }

    function goStudy() { showOnly("studyScreen"); }

    function checkAnswer() {
      const userText = document.getElementById("userAnswer").value;
      let score = 0;
      let missed = [];

correctAnswers.forEach(group => {
  const isCorrect = group.some(word => userText.includes(word));

  if (isCorrect) {
    score++;
  } else {
    missed.push(group[0]);
  }
});
      let message = "正解数：" + score + " / " + correctAnswers.length;
      if (missed.length === 0) message += "\nすべて正解です。";
      else message += "\n思い出せなかったもの：" + missed.join("、");

      document.getElementById("result").innerText = message;
      showOnly("resultScreen");
    }

    function resetPractice() {
      document.getElementById("userAnswer").value = "";
      document.getElementById("hintArea").style.display = "none";
      showOnly("studyScreen");
    }
  </script>
</body>
</html>
